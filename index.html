<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini CS FPS</title>

<style>
body { margin:0; overflow:hidden; background:#111; }

/* UI */
#ui {
 position:absolute;
 top:10px;
 left:10px;
 color:white;
 font-family:Arial;
}

/* CROSSHAIR */
#crosshair {
 position:absolute;
 top:50%;
 left:50%;
 width:20px;
 height:20px;
 margin-left:-10px;
 margin-top:-10px;
 pointer-events:none;
}

#crosshair:before, #crosshair:after {
 content:'';
 position:absolute;
 background:white;
}

#crosshair:before {
 width:2px;
 height:20px;
 left:9px;
}

#crosshair:after {
 width:20px;
 height:2px;
 top:9px;
}
</style>
</head>

<body>

<div id="ui">
HP: <span id="hp">100</span><br>
Ammo: <span id="ammo">30</span>
</div>

<div id="crosshair"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

// ---------------- SCENE ----------------
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));

// FLOOR
const floor = new THREE.Mesh(
 new THREE.PlaneGeometry(100,100),
 new THREE.MeshStandardMaterial({color:0x222222})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ---------------- PLAYER ----------------
camera.position.set(0,2,5);
let hp = 100;

// ---------------- CONTROLS ----------------
const keys = {};
document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

// MOUSE LOOK
let yaw=0, pitch=0;
document.body.onclick=()=>document.body.requestPointerLock();

document.addEventListener("mousemove", e=>{
 yaw -= e.movementX * 0.002;
 pitch -= e.movementY * 0.002;
 pitch = Math.max(-1.5, Math.min(1.5, pitch));
});

// ---------------- WEAPONS ----------------
const weapons = {
 ak: {
  ammo:30,
  max:30,
  fireRate:90,
  recoil:[
   {x:0,y:0},
   {x:0.2,y:-0.3},
   {x:-0.1,y:-0.4},
   {x:0.3,y:-0.5},
   {x:-0.2,y:-0.6},
   {x:0.4,y:-0.7}
  ]
 },
 pistol: {
  ammo:12,
  max:12,
  fireRate:400,
  recoil:[
   {x:0,y:0},
   {x:0.05,y:-0.1}
  ]
 }
};

let currentWeapon = "ak";
let recoilIndex = 0;
let lastShot = 0;
let reloading = false;

// UI
function updateUI(){
 document.getElementById("ammo").textContent =
 weapons[currentWeapon].ammo + " (" + currentWeapon.toUpperCase() + ")";
}
updateUI();

// SWITCH WEAPONS
document.addEventListener("keydown", e=>{
 if (e.key==="1") switchWeapon("ak");
 if (e.key==="2") switchWeapon("pistol");
 if (e.key.toLowerCase()==="r") reload();
});

function switchWeapon(w){
 currentWeapon = w;
 recoilIndex = 0;
 updateUI();
}

// RELOAD
function reload(){
 if (reloading) return;
 reloading = true;

 setTimeout(()=>{
  weapons[currentWeapon].ammo = weapons[currentWeapon].max;
  recoilIndex = 0;
  updateUI();
  reloading = false;
 },1200);
}

// ---------------- GUN MODEL ----------------
const gun = new THREE.Mesh(
 new THREE.BoxGeometry(0.2,0.2,0.8),
 new THREE.MeshStandardMaterial({color:0x333333})
);
gun.position.set(0.3,-0.3,-0.8);
camera.add(gun);
scene.add(camera);

// MUZZLE FLASH
const flash = new THREE.PointLight(0xffaa33,0,5);
camera.add(flash);

// ---------------- ENEMIES ----------------
const enemies = [];

function spawnEnemy(){
 const body = new THREE.Mesh(
  new THREE.BoxGeometry(1,1.5,1),
  new THREE.MeshStandardMaterial({color:"red"})
 );

 const head = new THREE.Mesh(
  new THREE.BoxGeometry(0.5,0.5,0.5),
  new THREE.MeshStandardMaterial({color:"yellow"})
 );

 body.position.set((Math.random()-0.5)*20,0.75,(Math.random()-0.5)*20);
 head.position.set(0,1.2,0);
 body.add(head);

 scene.add(body);

 enemies.push({body,head,hp:5});
}
setInterval(spawnEnemy,3000);

// ---------------- SHOOTING ----------------
document.addEventListener("click", ()=>{

 const w = weapons[currentWeapon];
 const now = Date.now();

 if (reloading || w.ammo<=0) return;
 if (now - lastShot < w.fireRate) return;

 w.ammo--;
 lastShot = now;
 updateUI();

 // muzzle flash
 flash.intensity = 5;
 setTimeout(()=>flash.intensity=0,50);

 // recoil pattern
 const r = w.recoil[recoilIndex] || w.recoil[w.recoil.length-1];
 recoilIndex++;

 const ray = new THREE.Raycaster();
 ray.setFromCamera(new THREE.Vector2(r.x*0.01,r.y*0.01), camera);

 enemies.forEach((e,i)=>{
  const headHit = ray.intersectObject(e.head);
  const bodyHit = ray.intersectObject(e.body);

  if(headHit.length) e.hp -= 3;
  else if(bodyHit.length) e.hp -= 1;

  if(e.hp<=0){
   scene.remove(e.body);
   enemies.splice(i,1);
  }
 });
});

// ---------------- LOOP ----------------
function animate(){
 requestAnimationFrame(animate);

 camera.rotation.order="YXZ";
 camera.rotation.y=yaw;
 camera.rotation.x=pitch;

 let move = new THREE.Vector3();
 if(keys["w"]) move.z -= 0.1;
 if(keys["s"]) move.z += 0.1;
 if(keys["a"]) move.x -= 0.1;
 if(keys["d"]) move.x += 0.1;

 camera.translateX(move.x);
 camera.translateZ(move.z);

 // enemy AI
 enemies.forEach(e=>{
  const dir = camera.position.clone().sub(e.body.position);
  const dist = dir.length();

  if(dist<20){
   dir.normalize();
   e.body.position.add(dir.multiplyScalar(0.02));
  }

  if(dist<1.5){
   hp -= 0.1;
   document.getElementById("hp").textContent = Math.floor(hp);
  }
 });

 renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
