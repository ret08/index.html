<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CS FPS Full Build</title>

<style>
body { margin:0; overflow:hidden; background:#111; }

#ui {
 position:absolute;
 top:10px;
 left:10px;
 color:white;
 font-family:Arial;
}

#crosshair {
 position:absolute;
 top:50%;
 left:50%;
 width:20px;
 height:20px;
 margin-left:-10px;
 margin-top:-10px;
 pointer-events:none;
}

#crosshair:before, #crosshair:after {
 content:'';
 position:absolute;
 background:white;
}

#crosshair:before { width:2px; height:20px; left:9px; }
#crosshair:after { width:20px; height:2px; top:9px; }

/* 🎯 HITMARKER */
#hitmarker {
 position:absolute;
 top:50%;
 left:50%;
 width:30px;
 height:30px;
 margin-left:-15px;
 margin-top:-15px;
 pointer-events:none;
 opacity:0;
}

#hitmarker:before, #hitmarker:after {
 content:'';
 position:absolute;
 width:2px;
 height:30px;
 background:red;
 top:0;
 left:14px;
}

#hitmarker:before { transform:rotate(45deg); }
#hitmarker:after { transform:rotate(-45deg); }

</style>
</head>

<body>

<div id="ui">
HP: <span id="hp">100</span><br>
Ammo: <span id="ammo">30</span>
</div>

<div id="crosshair"></div>
<div id="hitmarker"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

// ---------------- SCENE ----------------
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));

// FLOOR
const floor = new THREE.Mesh(
 new THREE.PlaneGeometry(100,100),
 new THREE.MeshStandardMaterial({color:0x222222})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ---------------- PLAYER ----------------
camera.position.set(0,2,5);
let hp = 100;

let velocityY = 0;
let onGround = false;

const gravity = -0.015;
const jumpStrength = 0.35;

// ---------------- INPUT ----------------
const keys = {};
document.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

// MOUSE LOOK
let yaw=0, pitch=0;
document.body.onclick=()=>document.body.requestPointerLock();

document.addEventListener("mousemove", e=>{
 yaw -= e.movementX * 0.002;
 pitch -= e.movementY * 0.002;
 pitch = Math.max(-1.5, Math.min(1.5, pitch));
});

// JUMP
document.addEventListener("keydown",(e)=>{
 if(e.code==="Space" && onGround){
  velocityY = jumpStrength;
  onGround = false;
 }
});

// ---------------- WEAPONS ----------------
const weapons = {
 ak:{
  ammo:30,
  max:30,
  fireRate:90,
  recoil:[
   {x:0,y:0},
   {x:0.2,y:-0.3},
   {x:-0.1,y:-0.4},
   {x:0.3,y:-0.5},
   {x:-0.2,y:-0.6},
   {x:0.4,y:-0.7}
  ]
 },
 pistol:{
  ammo:12,
  max:12,
  fireRate:400,
  recoil:[
   {x:0,y:0},
   {x:0.05,y:-0.1}
  ]
 }
};

let currentWeapon="ak";
let recoilIndex=0;
let lastShot=0;
let reloading=false;

function updateUI(){
 document.getElementById("ammo").textContent =
 weapons[currentWeapon].ammo + " ("+currentWeapon.toUpperCase()+")";
}
updateUI();

// SWITCH / RELOAD
document.addEventListener("keydown",(e)=>{
 if(e.key==="1") switchWeapon("ak");
 if(e.key==="2") switchWeapon("pistol");
 if(e.key.toLowerCase()==="r") reload();
});

function switchWeapon(w){
 currentWeapon=w;
 recoilIndex=0;
 updateUI();
}

function reload(){
 if(reloading) return;
 reloading=true;

 setTimeout(()=>{
  weapons[currentWeapon].ammo=weapons[currentWeapon].max;
  recoilIndex=0;
  updateUI();
  reloading=false;
 },1200);
}

// 🎯 HITMARKER FUNCTION
function showHitmarker(){
 const h=document.getElementById("hitmarker");
 h.style.opacity=1;

 setTimeout(()=>{
  h.style.opacity=0;
 },120);
}

// ---------------- VIEWMODEL ARMS ----------------
function createArms(){
 const arms=new THREE.Group();

 const skin=new THREE.MeshStandardMaterial({color:0xffd1a4});
 const sleeve=new THREE.MeshStandardMaterial({color:0x222222});

 const L=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.6,0.15),skin);
 L.position.set(-0.25,-0.2,-0.3);
 arms.add(L);

 const R=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.6,0.15),skin);
 R.position.set(0.25,-0.2,-0.3);
 arms.add(R);

 return arms;
}

const arms=createArms();
camera.add(arms);

// ---------------- AK MODEL ----------------
function createAK(){
 const gun=new THREE.Group();

 const bodyMat=new THREE.MeshStandardMaterial({color:0x2b2b2b});
 const woodMat=new THREE.MeshStandardMaterial({color:0x5a3a1b});

 const body=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.15,1.2),bodyMat);
 gun.add(body);

 const barrel=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,1),bodyMat);
 barrel.position.set(0,0.1,-0.9);
 gun.add(barrel);

 const stock=new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.8),woodMat);
 stock.position.set(0,0,0.9);
 gun.add(stock);

 const mag=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.4,0.2),bodyMat);
 mag.position.set(0,-0.25,-0.2);
 gun.add(mag);

 return gun;
}

const ak=createAK();
ak.position.set(0.1,-0.15,-0.5);
camera.add(ak);

// MUZZLE FLASH
const flash=new THREE.PointLight(0xffaa33,0,5);
camera.add(flash);

// ---------------- ENEMIES ----------------
const enemies=[];

function spawnEnemy(){
 const enemy=new THREE.Group();

 const bodyMat=new THREE.MeshStandardMaterial({color:0x8b0000});
 const headMat=new THREE.MeshStandardMaterial({color:0xffcc99});

 const body=new THREE.Mesh(new THREE.BoxGeometry(1,1.2,0.6),bodyMat);
 body.position.y=0.6;
 enemy.add(body);

 const head=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,0.5),headMat);
 head.position.y=1.4;
 enemy.add(head);

 enemy.position.set((Math.random()-0.5)*30,0,(Math.random()-0.5)*30);
 scene.add(enemy);

 enemies.push({
  model:enemy,
  bodyHitbox:body,
  headHitbox:head,
  hp:100,
  speed:0.02
 });
}
setInterval(spawnEnemy,2500);

// ---------------- SHOOT ----------------
document.addEventListener("click",()=>{

 const w=weapons[currentWeapon];
 const now=Date.now();

 if(reloading||w.ammo<=0) return;
 if(now-lastShot<w.fireRate) return;

 w.ammo--;
 lastShot=now;
 updateUI();

 flash.intensity=5;
 setTimeout(()=>flash.intensity=0,50);

 const r=w.recoil[recoilIndex]||w.recoil[w.recoil.length-1];
 recoilIndex++;

 const ray=new THREE.Raycaster();
 ray.setFromCamera(new THREE.Vector2(r.x*0.01,r.y*0.01),camera);

 enemies.forEach((e,i)=>{

 const headHit=ray.intersectObject(e.headHitbox,true);
 const bodyHit=ray.intersectObject(e.bodyHitbox,true);

 if(headHit.length){
  e.hp-=80;
  showHitmarker();
 }
 else if(bodyHit.length){
  e.hp-=30;
  showHitmarker();
 }

 if(e.hp<=0){
  scene.remove(e.model);
  enemies.splice(i,1);
 }
 });
});

// ---------------- LOOP ----------------
function animate(){
 requestAnimationFrame(animate);

 camera.rotation.order="YXZ";
 camera.rotation.y=yaw;
 camera.rotation.x=pitch;

 let move=new THREE.Vector3();
 if(keys["w"]) move.z-=0.1;
 if(keys["s"]) move.z+=0.1;
 if(keys["a"]) move.x-=0.1;
 if(keys["d"]) move.x+=0.1;

 camera.translateX(move.x);
 camera.translateZ(move.z);

 // gravity
 camera.position.y+=velocityY;
 velocityY+=gravity;

 if(camera.position.y<=2){
  camera.position.y=2;
  velocityY=0;
  onGround=true;
 } else onGround=false;

 // arm sway
 arms.position.y=-0.05+Math.sin(Date.now()*0.008)*0.01;
 arms.position.x=Math.sin(Date.now()*0.008)*0.01;

 // AI
 enemies.forEach(e=>{
  const dir=camera.position.clone().sub(e.model.position);
  const dist=dir.length();

  dir.normalize();

  if(dist<25){
   e.model.position.add(dir.multiplyScalar(e.speed));
  }

  if(dist<1.5){
   hp-=0.2;
   document.getElementById("hp").textContent=Math.floor(hp);
  }
 });

 renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
