<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CS FPS FIXED BUILD</title>

<style>
body { margin:0; overflow:hidden; background:#111; }

#ui {
 position:absolute;
 top:10px;
 left:10px;
 color:white;
 font-family:Arial;
}

#crosshair {
 position:absolute;
 top:50%;
 left:50%;
 width:20px;
 height:20px;
 margin-left:-10px;
 margin-top:-10px;
 pointer-events:none;
}

#crosshair:before, #crosshair:after {
 content:'';
 position:absolute;
 background:white;
}

#crosshair:before { width:2px; height:20px; left:9px; }
#crosshair:after { width:20px; height:2px; top:9px; }

#hitmarker {
 position:absolute;
 top:50%;
 left:50%;
 width:30px;
 height:30px;
 margin-left:-15px;
 margin-top:-15px;
 pointer-events:none;
 opacity:0;
}

#hitmarker:before, #hitmarker:after {
 content:'';
 position:absolute;
 width:2px;
 height:30px;
 background:red;
 top:0;
 left:14px;
}

#hitmarker:before { transform:rotate(45deg); }
#hitmarker:after { transform:rotate(-45deg); }

#killfeed {
 position:absolute;
 top:10px;
 right:10px;
 color:white;
 font-family:Arial;
 font-size:14px;
 text-align:right;
}
.kill { margin-bottom:5px; opacity:1; transition:opacity 2s; }
</style>
</head>

<body>

<div id="ui">
HP: <span id="hp">100</span><br>
Ammo: <span id="ammo">∞</span>
</div>

<div id="crosshair"></div>
<div id="hitmarker"></div>
<div id="killfeed"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

// ================= SETUP =================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));

// ================= FLOOR =================
const floor = new THREE.Mesh(
 new THREE.PlaneGeometry(100,100),
 new THREE.MeshStandardMaterial({color:0x222222})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ================= WALLS =================
const walls=[];
function wall(x,z,w,h,d){
 const m=new THREE.Mesh(
  new THREE.BoxGeometry(w,h,d),
  new THREE.MeshStandardMaterial({color:0x555555})
 );
 m.position.set(x,h/2,z);
 scene.add(m);
 m.box=new THREE.Box3().setFromObject(m);
 walls.push(m);
}

wall(0,-20,50,5,2);
wall(0,20,50,5,2);
wall(-25,0,2,5,50);
wall(25,0,2,5,50);

// ================= PLAYER =================
camera.position.set(0,2,5);

let hp=100;
let velocityY=0;
let onGround=false;

const gravity=-0.015;
const jumpStrength=0.35;

// ================= INPUT =================
const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let yaw=0,pitch=0;
document.body.onclick=()=>document.body.requestPointerLock();

document.addEventListener("mousemove",e=>{
 yaw-=e.movementX*0.002;
 pitch-=e.movementY*0.002;
 pitch=Math.max(-1.5,Math.min(1.5,pitch));
});

// jump
document.addEventListener("keydown",e=>{
 if(e.code==="Space"&&onGround){
  velocityY=jumpStrength;
  onGround=false;
 }
});

// ================= FEEDBACK =================
function hitmarker(){
 const h=document.getElementById("hitmarker");
 h.style.opacity=1;
 setTimeout(()=>h.style.opacity=0,100);
}

function killfeed(text){
 const k=document.getElementById("killfeed");
 const d=document.createElement("div");
 d.className="kill";
 d.textContent=text;
 k.appendChild(d);
 setTimeout(()=>{
  d.style.opacity=0;
  setTimeout(()=>d.remove(),2000);
 },2000);
}

// ================= ENEMIES =================
const enemies=[];const tracers = [];

function createTracer(start, end){
 const material = new THREE.LineBasicMaterial({ color: 0xffaa00 });

 const points = [];
 points.push(start.clone());
 points.push(end.clone());

 const geometry = new THREE.BufferGeometry().setFromPoints(points);
 const line = new THREE.Line(geometry, material);

 scene.add(line);

 tracers.push({
  line,
  life: 0.08
 });
}

function spawn(){
 const g=new THREE.Group();

 const body=new THREE.Mesh(
  new THREE.BoxGeometry(1,1.2,0.6),
  new THREE.MeshStandardMaterial({color:0x8b0000})
 );
 body.position.y=0.6;

 const head=new THREE.Mesh(
  new THREE.BoxGeometry(0.5,0.5,0.5),
  new THREE.MeshStandardMaterial({color:0xffcc99})
 );
 head.position.y=1.4;

 g.add(body);
 g.add(head);

 g.position.set((Math.random()-0.5)*20,0,(Math.random()-0.5)*20);
 scene.add(g);

 enemies.push({
  model:g,
  body,
  head,
  hp:100,
  speed:0.02
 });
}
setInterval(spawn,2000);

// ================= SHOOT =================
let recoil=0;
let last=0;

document.addEventListener("click",()=>{
document.addEventListener("click", ()=>{

 const now = Date.now();
 if(now - last < 120) return;
 last = now;

 const pattern = [
  {x:0,y:0},{x:0.1,y:-0.2},{x:-0.15,y:-0.3},
  {x:0.2,y:-0.35},{x:-0.2,y:-0.4}
 ];

 const r = pattern[recoil % pattern.length];
 recoil++;


 // 🔫 tracer start point
 const start = camera.position.clone();

 // default miss endpoint
 const end = start.clone().add(ray.ray.direction.clone().multiplyScalar(50));

 let hitSomething = false;

 enemies.forEach((e,i)=>{

  const h = ray.intersectObject(e.head,true);
  const b = ray.intersectObject(e.body,true);

  if(h.length){
   e.hp = 0;
   hitSomething = true;
   hitmarker();
   killfeed("🔴 Headshot kill");
  }

  else if(b.length){
   e.hp -= 50;
   hitSomething = true;
   hitmarker();
  }

  if(e.hp <= 0){
   scene.remove(e.model);
   enemies.splice(i,1);
   killfeed("☠ Enemy eliminated");
  }
 });

 // 🔥 TRACER LINE
 createTracer(
  start,
  hitSomething
   ? ray.ray.origin.clone().add(ray.ray.direction.clone().multiplyScalar(20))
   : end
 );

});
 const now=Date.now();
 if(now-last<120) return;
 last=now;

 const pattern=[
  {x:0,y:0},{x:0.1,y:-0.2},{x:-0.15,y:-0.3},
  {x:0.2,y:-0.35},{x:-0.2,y:-0.4}
 ];

 const r=pattern[recoil%pattern.length];
 recoil++;

 const ray=new THREE.Raycaster();
 ray.setFromCamera(new THREE.Vector2(r.x*0.01,r.y*0.01),camera);

 enemies.forEach((e,i)=>{

 const h=ray.intersectObject(e.head,true);
 const b=ray.intersectObject(e.body,true);

 if(h.length){
  e.hp=0;
  hitmarker();
  killfeed("🔴 Headshot kill");
 }

 else if(b.length){
  e.hp-=50;
  hitmarker();
 }

 if(e.hp<=0){
  scene.remove(e.model);
  enemies.splice(i,1);
  killfeed("☠ Enemy eliminated");
 }
 });
});

// ================= LOOP =================
function loop()for(let i = tracers.length - 1; i >= 0; i--){
 tracers[i].life -= 0.016;

 if(tracers[i].life <= 0){
  scene.remove(tracers[i].line);
  tracers.splice(i,1);
 }
}{function createAK(){
 const gun = new THREE.Group();

 const metal = new THREE.MeshStandardMaterial({ color: 0x2b2b2b });
 const wood = new THREE.MeshStandardMaterial({ color: 0x6b3f1d });

 // BODY
 const body = new THREE.Mesh(
  new THREE.BoxGeometry(0.45, 0.12, 1.5),
  metal
 );
 gun.add(body);

 // BARREL
 const barrel = new THREE.Mesh(
  new THREE.BoxGeometry(0.06, 0.06, 1.4),
  metal
 );
 barrel.position.set(0, 0.08, -1.05);
 gun.add(barrel);

 // HANDGUARD
 const handguard = new THREE.Mesh(
  new THREE.BoxGeometry(0.22, 0.18, 0.65),
  wood
 );
 handguard.position.set(0, 0, -0.35);
 gun.add(handguard);

 // MAGAZINE (angled CS style)
 const mag = new THREE.Mesh(
  new THREE.BoxGeometry(0.16, 0.55, 0.25),
  metal
 );
 mag.position.set(0, -0.25, 0.15);
 mag.rotation.x = -0.25;
 gun.add(mag);

 // STOCK
 const stock = new THREE.Mesh(
  new THREE.BoxGeometry(0.25, 0.2, 0.95),
  wood
 );
 stock.position.set(0, 0, 1.0);
 gun.add(stock);

 return gun;
}camera.position.set(0,2,5);const ak = createAK();
ak.position.set(0.25, -0.25, -0.6);
camera.add(ak);ak.position.y = -0.25 + Math.sin(Date.now() * 0.01) * 0.01;
ak.position.x = 0.25 + Math.sin(Date.now() * 0.01) * 0.01;
 requestAnimationFrame(loop);

 camera.rotation.order="YXZ";
 camera.rotation.y=yaw;
 camera.rotation.x=pitch;

 let move=new THREE.Vector3();

 if(keys["w"])move.z-=0.1;
 if(keys["s"])move.z+=0.1;
 if(keys["a"])move.x-=0.1;
 if(keys["d"])move.x+=0.1;

 const next=camera.position.clone();
 next.x+=move.x;
 next.z+=move.z;

 const box=new THREE.Box3().setFromCenterAndSize(next,new THREE.Vector3(1,2,1));

 let blocked=false;
 for(let w of walls){
  if(box.intersectsBox(w.box)) blocked=true;
 }

 if(!blocked) camera.position.copy(next);

 // gravity
 camera.position.y+=velocityY;
 velocityY+=gravity;

 if(camera.position.y<=2){
  camera.position.y=2;
  velocityY=0;
  onGround=true;
 } else onGround=false;

 // AI
 enemies.forEach(e=>{
  const dir=camera.position.clone().sub(e.model.position);
  const dist=dir.length();
  dir.normalize();

  if(dist<20){
   e.model.position.add(dir.multiplyScalar(e.speed));
  }

  if(dist<1.5){
   hp-=0.2;
   document.getElementById("hp").textContent=Math.floor(hp);
  }
 });

 renderer.render(scene,camera);
}
loop();

</script>

</body>
</html>
