<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CS FPS ULTIMATE BUILD</title>

<style>
body { margin:0; overflow:hidden; background:#111; }

#ui {
 position:absolute;
 top:10px;
 left:10px;
 color:white;
 font-family:Arial;
}

#crosshair {
 position:absolute;
 top:50%;
 left:50%;
 width:20px;
 height:20px;
 margin-left:-10px;
 margin-top:-10px;
 pointer-events:none;
}

#crosshair:before, #crosshair:after {
 content:'';
 position:absolute;
 background:white;
}

#crosshair:before { width:2px; height:20px; left:9px; }
#crosshair:after { width:20px; height:2px; top:9px; }

#hitmarker {
 position:absolute;
 top:50%;
 left:50%;
 width:30px;
 height:30px;
 margin-left:-15px;
 margin-top:-15px;
 pointer-events:none;
 opacity:0;
}

#hitmarker:before, #hitmarker:after {
 content:'';
 position:absolute;
 width:2px;
 height:30px;
 background:red;
 top:0;
 left:14px;
}

#hitmarker:before { transform:rotate(45deg); }
#hitmarker:after { transform:rotate(-45deg); }
</style>
</head>

<body>

<div id="ui">
HP: <span id="hp">100</span><br>
Ammo: <span id="ammo">30</span>
</div>

<div id="crosshair"></div>
<div id="hitmarker"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));

// ================= SOUND =================
const listener = new THREE.AudioListener();
camera.add(listener);

const audioLoader = new THREE.AudioLoader();

function playSound(url, volume=0.4){
 const sound = new THREE.Audio(listener);
 audioLoader.load(url, buffer=>{
  sound.setBuffer(buffer);
  sound.setVolume(volume);
  sound.play();
 });
}

// ================= FLOOR =================
const floor = new THREE.Mesh(
 new THREE.PlaneGeometry(100,100),
 new THREE.MeshStandardMaterial({color:0x222222})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// ================= WALLS =================
const walls=[];
function createWall(x,z,w,h,d){
 const wall=new THREE.Mesh(
  new THREE.BoxGeometry(w,h,d),
  new THREE.MeshStandardMaterial({color:0x555555})
 );
 wall.position.set(x,h/2,z);
 scene.add(wall);
 wall.box=new THREE.Box3().setFromObject(wall);
 walls.push(wall);
}

// simple map
for(let i=-25;i<=25;i+=10){
 createWall(i,0,2,5,2);
 createWall(0,i,2,5,2);
}

// ================= PLAYER =================
camera.position.set(0,2,5);
let hp=100;
let velocityY=0;
let onGround=false;

const gravity=-0.015;
const jumpStrength=0.35;

// ================= INPUT =================
const keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

let yaw=0,pitch=0;
document.body.onclick=()=>document.body.requestPointerLock();

document.addEventListener("mousemove",e=>{
 yaw-=e.movementX*0.002;
 pitch-=e.movementY*0.002;
 pitch=Math.max(-1.5,Math.min(1.5,pitch));
});

document.addEventListener("keydown",e=>{
 if(e.code==="Space"&&onGround){
  velocityY=jumpStrength;
  onGround=false;
 }

 if(e.key.toLowerCase()==="e"&&!bombPlanted){
  plantBomb();
 }
});

// ================= WEAPONS =================
let recoilIndex=0;
let lastShot=0;
let reloading=false;

const akSpray=[
 {x:0,y:0},{x:0.1,y:-0.2},{x:-0.15,y:-0.3},
 {x:0.2,y:-0.35},{x:-0.25,y:-0.4},
 {x:0.3,y:-0.5},{x:-0.2,y:-0.55},
 {x:0.1,y:-0.6}
];

// ================= HITMARKER =================
function showHitmarker(){
 const h=document.getElementById("hitmarker");
 h.style.opacity=1;
 setTimeout(()=>h.style.opacity=0,120);
}

// ================= AK =================
function createAK(){
 const g=new THREE.Group();
 const m=new THREE.MeshStandardMaterial({color:0x2b2b2b});
 const w=new THREE.MeshStandardMaterial({color:0x5a3a1b});

 const body=new THREE.Mesh(new THREE.BoxGeometry(0.45,0.15,1.3),m);
 const barrel=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.08,1.1),m);
 barrel.position.z=-0.9;

 g.add(body);
 g.add(barrel);
 return g;
}

const ak=createAK();
ak.position.set(0.1,-0.15,-0.5);
camera.add(ak);

// ================= BOMB =================
let bombPlanted=false;
let bombTimer=40;
let bombObj=null;

function plantBomb(){
 bombPlanted=true;
 bombTimer=40;

 const b=new THREE.Mesh(
  new THREE.SphereGeometry(0.3),
  new THREE.MeshStandardMaterial({color:0xff0000})
 );

 b.position.copy(camera.position);
 scene.add(b);
 bombObj=b;

 playSound("https://cdn.pixabay.com/download/audio/2022/03/15/audio_6b7d7d9c45.mp3?filename=reload-5931.mp3",0.3);
}

// ================= ENEMIES =================
const enemies=[];

function spawnEnemy(){
 const e=new THREE.Group();

 const body=new THREE.Mesh(
  new THREE.BoxGeometry(1,1.2,0.6),
  new THREE.MeshStandardMaterial({color:0x8b0000})
 );
 body.position.y=0.6;

 const head=new THREE.Mesh(
  new THREE.BoxGeometry(0.5,0.5,0.5),
  new THREE.MeshStandardMaterial({color:0xffcc99})
 );
 head.position.y=1.4;

 e.add(body); e.add(head);

 e.position.set((Math.random()-0.5)*20,0,(Math.random()-0.5)*20);
 scene.add(e);

 enemies.push({
  model:e,
  bodyHitbox:body,
  headHitbox:head,
  hp:100,
  speed:0.02,
  shootCooldown:0,
  fireRate:1200
 });
}
setInterval(spawnEnemy,2500);

// ================= SHOOT =================
document.addEventListener("click",()=>{

 const now=Date.now();
 if(now-lastShot<90||reloading) return;

 lastShot=now;

 playSound("https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a3c0c6.mp3?filename=gunshot-36488.mp3",0.3);

 const r=akSpray[recoilIndex%akSpray.length];
 recoilIndex++;

 const ray=new THREE.Raycaster();
 ray.setFromCamera(new THREE.Vector2(r.x*0.01,r.y*0.01),camera);

 enemies.forEach((e,i)=>{

 const h=ray.intersectObject(e.headHitbox,true);
 const b=ray.intersectObject(e.bodyHitbox,true);

 if(h.length){
  e.hp=0;
  showHitmarker();
 } else if(b.length){
  e.hp-=30;
  showHitmarker();
 }

 if(e.hp<=0){
  scene.remove(e.model);
  enemies.splice(i,1);
 }
 });
});

// ================= LOOP =================
function animate(){
 requestAnimationFrame(animate);

 camera.rotation.order="YXZ";
 camera.rotation.y=yaw;
 camera.rotation.x=pitch;

 let move=new THREE.Vector3();

 if(keys["w"])move.z-=0.1;
 if(keys["s"])move.z+=0.1;
 if(keys["a"])move.x-=0.1;
 if(keys["d"])move.x+=0.1;

 const next=camera.position.clone();
 next.x+=move.x;
 next.z+=move.z;

 const box=new THREE.Box3().setFromCenterAndSize(next,new THREE.Vector3(1,2,1));

 let blocked=false;
 for(let w of walls){
  w.box.setFromObject(w);
  if(box.intersectsBox(w.box)) blocked=true;
 }

 if(!blocked) camera.position.copy(next);

 camera.position.y+=velocityY;
 velocityY+=gravity;

 if(camera.position.y<=2){
  camera.position.y=2;
  velocityY=0;
  onGround=true;
 } else onGround=false;

 // AI (cover + chase)
 enemies.forEach(e=>{
  const dir=camera.position.clone().sub(e.model.position);
  const dist=dir.length();

  dir.normalize();

  const ray=new THREE.Raycaster(e.model.position,dir);
  const hit=ray.intersectObjects(walls);

  if(dist<25 && hit.length===0){
   e.model.position.add(dir.multiplyScalar(e.speed));
  } else {
   const side=new THREE.Vector3(-dir.z,0,dir.x);
   e.model.position.add(side.multiplyScalar(0.02));
  }

  if(dist<1.5){
   hp-=0.2;
   document.getElementById("hp").textContent=Math.floor(hp);
  }
 });

 // bomb timer
 if(bombPlanted){
  bombTimer-=0.016;
  if(bombTimer<=0){
   alert("💥 BOMB EXPLODED - TERRORISTS WIN");
   location.reload();
  }
 }

 renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
